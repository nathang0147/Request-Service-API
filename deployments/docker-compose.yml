services:
  request-service-api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/request_service?sslmode=disable
      WALT_BASE_URL: https://walt.example.com
      WALT_API_KEY: local-dev-token
      CALLBACK_BASE_URL: http://localhost:8080
      LOG_LEVEL: info
      DEFAULT_PROVIDER: walt
      CALLBACK_AUTH_SECRET: local-callback-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: request_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d request_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/request_service?sslmode=disable",
        "up"
      ]
    volumes:
      - ../db/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
