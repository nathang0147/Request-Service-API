version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "db/migrations/0001_init.up.sql"
    queries:
      - "db/query/verification_requests.sql"
      - "db/query/verification_sessions.sql"
      - "db/query/verification_events.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/persistence/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
